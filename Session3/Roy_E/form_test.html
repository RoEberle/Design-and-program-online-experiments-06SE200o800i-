<body>
    <span style="text-align: center;">
    <form>
        <label>
           What is your goldfish's name?
        </label>
        <input type="text" placeholder="Type a name here" required>
        <br><label>
            How old is your goldfish?
        </label>
        <input type="number" min="1" max="999">
        <br><label>
            Check to agree that your answer is truthful and correct
        </label>
        <input type="checkbox" value="Yes"> | <input type="checkbox" value="No"> <br>
        <label style="color:blue; font-size: 12pt; font-weight: bold; font-family: 'Times New Roman', Times, serif;">What's your favourite input type?</label>
        <select name="input" id="input_type">
        <option>text</option>
        <option>number</option>
        <option>range</option>
        <option>checkbox</option>
        <option>radio</option>
        <option>submit</option>
        <option>reset</option>
        </select> <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
    </span>
</body>
