<!DOCTYPE html>
<html>
  <head>
    <title>Verbal Fluency Test</title>
    <script src="https://unpkg.com/jspsych@8.2.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-initialize-microphone@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-audio-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
   body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    </style>
</head>
  <body>
  <script>

    /* initialize jsPsych */
    const jsPsych = initJsPsych({
    on_finish: () => {
    // Local save as JSON
    jsPsych.data.get().localSave('csv', 'verbal_fluency_data.csv');}
    });

    // Global-level data: add participant metadata
    jsPsych.data.addProperties({
    participant_id: 'P001',
    session: 1
    });

    /* create timeline */
    const timeline = [];

    /* initiate the microphone in the timeline */
    const microphoneInit = {
        type: jsPsychInitializeMicrophone,
        on_start: () => {
          console.log("Initializing microphone...");
        },
        on_finish: () => {
          console.log("Microphone initialized.");
        }
      };
    timeline.push(microphoneInit);

   /* add instruction the timeline */
    const instruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <h1>Verbal Fluency Test Instruction</h2>
        <p>Tell me as many words as you
        can think of that begin with a certain letter of the alphabet that I will tell you in a moment. <br><br> You
        can say any kind of word you want, except for proper nouns (like Bob or Boston), numbers <br><br>
        The recording will stop after one minute.  <br><br> Are you ready?.</p>
      `,
      choices: ['Yes,I am ready!'],
      data: {
        phase: 'instruction'
      },
      on_finish: (data) => {
                data.speed_label = data.rt < 3000 ? 'fast' : 'slow';
              }
    }
    timeline.push(instruction);

    /* exercise 8.1:  add recording for 1 min the timeline */

const randomLetter = ('ABCDEFGHIJKLMNOPQRSTUVWXYZ').split('')[(Math.floor(Math.random() * 26 ))]

const record_verbalfluency = {
  type: jsPsychHtmlAudioResponse,
  stimulus: `
      <h1> ${randomLetter} </h1>
      <p> Say as many words containing the letter displayed above. </p>`,
  recording_duration: 60000,
  data: {
      phase: 'fluency',
      condition: `${randomLetter}-Words`
    },
}

    timeline.push(record_verbalfluency);

  const endMessage = {
  type: jsPsychHtmlButtonResponse,
  stimulus: () => {
  // Access and summarize data
  const allData = jsPsych.data.get();
  const nSlow = allData.filter({ speed_label: 'slow' }).count();
  return nSlow > 0? "too slow!": "Thank you!";
  },
  choices: ['Finish'],
  data: { phase: 'end' }
  };
  timeline.push(endMessage);


  
    /* start the experiment */
    jsPsych.run(timeline);
    
  

  </script>
  </body>
</html>
